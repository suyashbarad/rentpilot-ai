version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: rentpilot-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Mohini*#007
      MYSQL_DATABASE: rentpilot_ai

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pMohini*#007"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: rentpilot-redis
    restart: always

    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: rentpilot-backend
    restart: always

    ports:
      - "5001:5001"

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

    environment:
      PORT: 5001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Mohini*#007
      DB_NAME: rentpilot_ai
      JWT_SECRET: RentPilotAI@2026
      REDIS_HOST: redis
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

volumes:
  mysql_data: